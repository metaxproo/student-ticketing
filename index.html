<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HNU - Ticketing Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef1f7; display: flex; min-height: 100vh; }

        /* ── Sidebar ── */
        .sidebar {
            width: 220px;
            background: #1b3a8c;
            color: white;
            min-height: 100vh;
            padding: 28px 0;
            position: fixed;
            top: 0; left: 0;
        }
        .sidebar-logo {
            font-size: 18px;
            font-weight: 700;
            padding: 0 20px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }
        .sidebar-nav { margin-top: 16px; }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            font-size: 14px;
            border-radius: 0;
            transition: background 0.2s, color 0.2s;
        }
        .sidebar-nav a.active {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        .sidebar-nav a:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-icon { font-size: 16px; }

        /* ── Main ── */
        .main {
            margin-left: 220px;
            padding: 36px 40px;
            flex: 1;
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        .page-title { font-size: 26px; font-weight: 700; color: #1b3a8c; }
        .btn-create {
            background: #1b3a8c;
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }
        .btn-create:hover { background: #14297a; }

        /* ── Stat Cards ── */
        .stats-row { display: flex; gap: 20px; margin-bottom: 28px; }
        .stat-card {
            flex: 1;
            padding: 28px 30px;
            border-radius: 14px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .stat-card.blue { background: #1b3a8c; }
        .stat-card.orange { background: #f5a623; }
        .stat-num { font-size: 40px; font-weight: 700; line-height: 1; }
        .stat-label { font-size: 18px; font-weight: 500; opacity: 0.9; }

        /* ── Table ── */
        .table-card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        thead tr { border-bottom: 1px solid #eef1f7; }
        th {
            padding: 16px 20px;
            text-align: left;
            font-size: 11px;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }
        td {
            padding: 16px 20px;
            font-size: 14px;
            color: #333;
            border-bottom: 1px solid #f5f5f5;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafbff; }

        .ticket-title { font-weight: 600; color: #222; }

        /* Status badges */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-open { background: #e8f4fd; color: #1a73e8; }
        .badge-processed { background: #e6f9ef; color: #1e8a4a; }
        .badge-pending { background: #fff4e0; color: #d4870a; }

        /* Priority */
        .priority-low { color: #888; }
        .priority-high { color: #e74c3c; font-weight: 600; }

        /* Admin comment box */
        .admin-msg {
            margin-top: 8px;
            background: #fff5f5;
            color: #c0392b;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            border-left: 3px solid #e74c3c;
        }
        .admin-msg b { color: #c0392b; }

        /* Escalation notice */
        .escalation-msg {
            margin-top: 8px;
            background: #f3e8ff;
            color: #7c3aed;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            border-left: 3px solid #7c3aed;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #bbb;
            font-size: 15px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white;
            border-radius: 16px;
            padding: 32px;
            width: 460px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .modal h3 { font-size: 20px; color: #1b3a8c; margin-bottom: 20px; }
        .modal label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 6px; }
        .modal input, .modal textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            font-family: inherit;
        }
        .modal textarea { resize: vertical; min-height: 100px; }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; }
        .btn-cancel {
            padding: 10px 20px; border: 1px solid #ddd; background: white;
            border-radius: 8px; cursor: pointer; font-size: 14px;
        }
        .btn-submit {
            padding: 10px 20px; background: #1b3a8c; color: white;
            border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-logo">🏛️ HNU Portal</div>
    <nav class="sidebar-nav">
        <a href="#" class="active"><span class="nav-icon">🏠</span> Dashboard</a>
        <a href="#"><span class="nav-icon">🎫</span> My Tickets</a>
    </nav>
</div>

<!-- Main -->
<div class="main">
    <div class="top-bar">
        <div class="page-title">Ticketing Dashboard</div>
        <button class="btn-create" onclick="openModal()">+ Create New Ticket</button>
    </div>

    <!-- Stats -->
    <div class="stats-row">
        <div class="stat-card blue">
            <div class="stat-num" id="st-total">0</div>
            <div class="stat-label">Total Tickets</div>
        </div>
        <div class="stat-card orange">
            <div class="stat-num" id="st-pending">0</div>
            <div class="stat-label">Pending Updates</div>
        </div>
    </div>

    <!-- Table -->
    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Subject &amp; Admin Update</th>
                    <th>Status</th>
                    <th>Priority</th>
                </tr>
            </thead>
            <tbody id="student-tbody">
                <tr><td colspan="4" class="empty-state">No tickets yet. Create your first ticket!</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Create Ticket Modal -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <h3>🎫 Create New Ticket</h3>
        <label>Subject</label>
        <input type="text" id="ticket-title" placeholder="Brief description of your issue...">
        <label>Details</label>
        <textarea id="ticket-desc" placeholder="Provide more details about your issue..."></textarea>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-submit" onclick="submitTicket()">Submit Ticket</button>
        </div>
    </div>
</div>

<script>
    const API = 'http://localhost:3000';

    function getBadge(status) {
        const map = {
            'Open': 'badge-open',
            'Processed': 'badge-processed',
            'Pending': 'badge-pending'
        };
        return `<span class="badge ${map[status] || 'badge-open'}">${status}</span>`;
    }

    function getPriority(p) {
        return `<span class="priority-${p.toLowerCase()}">${p}</span>`;
    }

    async function load() {
        try {
            const res = await fetch(`${API}/api/my-tickets`);
            const data = await res.json();

            document.getElementById('st-total').textContent = data.length;
            document.getElementById('st-pending').textContent = data.filter(t => t.admin_comment && t.status !== 'Processed').length;

            const tbody = document.getElementById('student-tbody');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No tickets yet. Create your first ticket!</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(t => `
                <tr>
                    <td><b>#${t.ticket_id}</b></td>
                    <td>
                        <div class="ticket-title">${t.title}</div>
                        ${t.admin_comment ? `<div class="admin-msg">📢 <b>Admin:</b> ${t.admin_comment}</div>` : ''}
                        ${t.escalation_reason ? `<div class="escalation-msg">⬆️ <b>Escalated:</b> ${t.escalation_reason}</div>` : ''}
                    </td>
                    <td>${getBadge(t.status)}</td>
                    <td>${getPriority(t.priority)}</td>
                </tr>
            `).join('');
        } catch (e) {
            console.error('Could not connect to server:', e);
        }
    }

    function openModal() {
        document.getElementById('modal').classList.add('active');
        document.getElementById('ticket-title').focus();
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
        document.getElementById('ticket-title').value = '';
        document.getElementById('ticket-desc').value = '';
    }

    async function submitTicket() {
        const title = document.getElementById('ticket-title').value.trim();
        if (!title) { alert('Please enter a subject.'); return; }
        try {
            await fetch(`${API}/api/tickets`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title })
            });
            closeModal();
            load();
        } catch (e) {
            alert('Could not connect to server.');
        }
    }

    // Close modal on overlay click
    document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    window.onload = load;
    // Auto-refresh every 15 seconds to show admin updates
    setInterval(load, 15000);
</script>
</body>
</html>
